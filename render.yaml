services:
  - type: web
    name: k2nobeit-api
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run db:generate -w apps/api && npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npm run db:seed -w apps/api && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
