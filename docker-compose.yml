services:
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: k2nobeit, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres}
    ports: ["5432:5432"]
    volumes: [db_data:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U postgres"], interval: 5s, timeout: 5s, retries: 10}
  api:
    build: {context: ., dockerfile: Dockerfile.api}
    env_file: .env
    ports: ["4000:4000"]
    depends_on: {db: {condition: service_healthy}}
  web:
    build: {context: ., dockerfile: Dockerfile.web}
    environment: {NEXT_PUBLIC_API_URL: http://api:4000/api, NEXT_PUBLIC_SITE_URL: http://localhost:3000}
    ports: ["3000:3000"]
    depends_on: [api]
volumes: {db_data: {}}
